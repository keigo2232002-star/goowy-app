<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ミニマルカレンダー</title>

<style>
  body {
    font-family: "Yu Gothic", sans-serif;
    background: #ffeef4;
    margin: 20px;
    color: #333;
  }
  .calendar {
    max-width: 360px;
    margin: auto;
    background: #fff0f6;
    padding: 15px;
    border-radius: 12px;
  }
  #monthHeader {
    display: flex;
    justify-content: space-between;
    font-size: 22px;
    margin-bottom: 10px;
    color: #d63384;
  }
  #weekdayHeader {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 6px;
    font-size: 14px;
    color: #c2255c;
  }
  #calendarGrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day {
    padding: 12px 0;
    text-align: center;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
  }
  .day:hover {
    background: #ffd6e8;
  }
  .selected {
    border: 2px solid #d63384;
    border-radius: 50%;
  }
  .today {
    background: #ffe3ec;
    border-radius: 50%;
  }
  .sunday, .saturday {
    color: #d63384 !important;
  }
  #rateBox {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
    color: #d63384;
    font-weight: bold;
  }
  #yearRateBox {
    margin-top: 20px;
    text-align: center;
    font-size: 16px;
    color: #d63384;
  }
</style>
</head>

<body>
<img src="goowy.png" alt="システムロゴ"
     style="width:100%; max-width:500px; display:block; margin:0 auto 20px;">

<div class="calendar" id="calendarArea">
  <div id="monthHeader">
    <span id="prevMonth">←</span>
    <span id="monthLabel"></span>
    <span id="nextMonth">→</span>
  </div>

  <div id="weekdayHeader">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>

  <div id="calendarGrid"></div>

  <div id="rateBox">○数: 0 / 経過日数: 0日 / 実施率: 0%（3流）</div>

  <div id="yearRateBox"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-Bb1m_l3c2f_zC1CP1Z-BT5INRezX3E",
    authDomain: "goowy-app-id.firebaseapp.com",
    databaseURL: "https://goowy-app-id-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "goowy-app-id",
    storageBucket: "goowy-app-id.appspot.com",
    messagingSenderId: "636723257281",
    appId: "1:636723257281:web:fe259098455a64b36d0940"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const rootRef = ref(db, "selectedDays");

  const monthLabel = document.getElementById("monthLabel");
  const calendarGrid = document.getElementById("calendarGrid");
  const rateBox = document.getElementById("rateBox");
  const yearRateBox = document.getElementById("yearRateBox");

  let current = new Date();
  let saved = {};

  function getDaysFromJan1(year) {
    const today = new Date();
    if (today.getFullYear() !== year) return (year % 4 === 0) ? 366 : 365;
    const start = new Date(year, 0, 1);
    return Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
  }

  function updateYearRate() {
    const years = {};
    Object.keys(saved).forEach(date => {
      const y = Number(date.split("-")[0]);
      if (!years[y]) years[y] = 0;
      years[y]++;
    });

    let html = "";
    Object.keys(years).sort().forEach(y => {
      const total = (y % 4 === 0) ? 366 : 365;
      const rate = ((years[y] / total) * 100).toFixed(1);
      html += `${y}年　${rate}%<br>`;
    });

    yearRateBox.innerHTML = html;
  }

  function updateRate() {
    const year = new Date().getFullYear();
    const selectedCount = Object.keys(saved).filter(d => d.startsWith(String(year))).length;
    const days = getDaysFromJan1(year);
    const rate = days > 0 ? ((selectedCount / days) * 100).toFixed(1) : "0.0";
    const rank = (rate >= 30) ? "一流" : "3流";

    rateBox.textContent = `○数: ${selectedCount} / 経過日数: ${days}日 / 実施率: ${rate}%（${rank}）`;
  }

  function renderCalendar() {
    calendarGrid.innerHTML = "";
    const year = current.getFullYear();
    const month = current.getMonth();

    monthLabel.textContent = `${year} / ${month + 1}`;

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    // ★★★ ここが修正ポイント（firstDay に修正）★★★
    for (let i = 0; i < firstDay; i++) {
      calendarGrid.appendChild(document.createElement("div"));
    }

    const today = new Date();
    const isThisMonth =
      today.getFullYear() === year && today.getMonth() === month;

    for (let d = 1; d <= lastDate; d++) {
      const cell = document.createElement("div");
      cell.textContent = d;
      cell.classList.add("day");

      const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

      if (isThisMonth && d === today.getDate()) {
        cell.classList.add("today");
      }

      const weekday = new Date(year, month, d).getDay();
      if (weekday === 0) cell.classList.add("sunday");
      if (weekday === 6) cell.classList.add("saturday");

      if (saved[dateKey]) {
        cell.classList.add("selected");
      }

      cell.addEventListener("click", () => {
        const dayRef = ref(db, "selectedDays/" + dateKey);
        if (saved[dateKey]) {
          set(dayRef, null);
        } else {
          set(dayRef, true);
        }
      });

      calendarGrid.appendChild(cell);
    }
  }

  onValue(rootRef, (snapshot) => {
    saved = snapshot.val() || {};
    renderCalendar();
    updateRate();
    updateYearRate();
  });

  document.getElementById("prevMonth").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
  };

  document.getElementById("nextMonth").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
  };
</script>

</body>
</html>
