<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ミニマルカレンダー</title>

<style>
  body {
    font-family: "Yu Gothic", sans-serif;
    background: #ffeef4;
    margin: 20px;
    color: #333;
  }

  .calendar {
    max-width: 360px;
    margin: auto;
    background: #fff0f6;
    padding: 15px;
    border-radius: 12px;
  }

  #monthHeader {
    display: flex;
    justify-content: space-between;
    font-size: 22px;
    margin-bottom: 10px;
    color: #d63384;
  }

  #weekdayHeader {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 6px;
    font-size: 14px;
    color: #c2255c;
  }

  #calendarGrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day {
    padding: 12px 0;
    text-align: center;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
  }

  .day:hover {
    background: #ffd6e8;
  }

  .selected {
    border: 2px solid #d63384;
    border-radius: 50%;
  }

  .today {
    background: #ffe3ec;
    border-radius: 50%;
  }

  .holiday, .saturday, .sunday {
    color: #d63384 !important;
  }

  .holiday {
    background: #ffe3ec;
  }

  #rateBox {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
    color: #d63384;
    font-weight: bold;
  }
</style>
</head>

<body>
<img src="goowy.png" alt="システムロゴ" 
     style="width:100%; max-width:500px; display:block; margin:0 auto 20px;">

<div class="calendar" id="calendarArea">
  <div id="monthHeader">
    <span id="prevMonth">←</span>
    <span id="monthLabel"></span>
    <span id="nextMonth">→</span>
  </div>

  <div id="weekdayHeader">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>

  <div id="calendarGrid"></div>

  <div id="rateBox">○数: 0 / 経過日数: 0日 / 実施率: 0%</div>
</div>

<script>
  const monthLabel = document.getElementById("monthLabel");
  const calendarGrid = document.getElementById("calendarGrid");
  const rateBox = document.getElementById("rateBox");

  let current = new Date();

  // 祝日データ（2026年）
  const holidays = {
    "2026-01-01": "元日",
    "2026-01-12": "成人の日",
    "2026-02-11": "建国記念の日",
    "2026-02-23": "天皇誕生日",
    "2026-03-20": "春分の日",
    "2026-04-29": "昭和の日",
    "2026-05-03": "憲法記念日",
    "2026-05-04": "みどりの日",
    "2026-05-05": "こどもの日",
    "2026-07-20": "海の日",
    "2026-08-11": "山の日",
    "2026-09-21": "敬老の日",
    "2026-09-22": "国民の休日",
    "2026-09-23": "秋分の日",
    "2026-10-12": "体育の日",
    "2026-11-03": "文化の日",
    "2026-11-23": "勤労感謝の日"
  };

  // localStorage 保存データ
  let saved = JSON.parse(localStorage.getItem("selectedDays") || "{}");

  function getDaysFromJan1() {
    const today = new Date();
    const start = new Date(today.getFullYear(), 0, 1);
    return Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
  }

  function updateRate() {
    const selectedCount = Object.keys(saved).length;
    const days = getDaysFromJan1();
    const rate = ((selectedCount / days) * 100).toFixed(1);
    rateBox.textContent = `○数: ${selectedCount} / 経過日数: ${days}日 / 実施率: ${rate}%`;
  }

  function renderCalendar() {
    calendarGrid.innerHTML = "";
    const year = current.getFullYear();
    const month = current.getMonth();

    monthLabel.textContent = `${year} / ${month + 1}`;

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      calendarGrid.appendChild(document.createElement("div"));
    }

    const today = new Date();
    const isThisMonth =
      today.getFullYear() === year && today.getMonth() === month;

    for (let d = 1; d <= lastDate; d++) {
      const cell = document.createElement("div");
      cell.textContent = d;
      cell.classList.add("day");

      const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

      // 今日
      if (isThisMonth && d === today.getDate()) {
        cell.classList.add("today");
      }

      // 土日
      const weekday = new Date(year, month, d).getDay();
      if (weekday === 0) cell.classList.add("sunday");
      if (weekday === 6) cell.classList.add("saturday");

      // 祝日
      if (holidays[dateKey]) {
        cell.classList.add("holiday");
      }

      // 保存された○
      if (saved[dateKey]) {
        cell.classList.add("selected");
      }

      // クリックで○トグル
      cell.addEventListener("click", () => {
        if (saved[dateKey]) {
          delete saved[dateKey];
          cell.classList.remove("selected");
        } else {
          saved[dateKey] = true;
          cell.classList.add("selected");
        }
        localStorage.setItem("selectedDays", JSON.stringify(saved));
        updateRate();
      });

      calendarGrid.appendChild(cell);
    }
  }

  // 月移動
  document.getElementById("prevMonth").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    renderCalendar();
  };

  document.getElementById("nextMonth").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    renderCalendar();
  };

  // スワイプ操作
  let startX = 0;
  const area = document.getElementById("calendarArea");

  area.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  area.addEventListener("touchend", (e) => {
    const endX = e.changedTouches[0].clientX;
    const diff = endX - startX;

    if (diff > 50) {
      current.setMonth(current.getMonth() - 1);
      renderCalendar();
    } else if (diff < -50) {
      current.setMonth(current.getMonth() + 1);
      renderCalendar();
    }
  });

  renderCalendar();
  updateRate();
</script>
</body>
</html>
